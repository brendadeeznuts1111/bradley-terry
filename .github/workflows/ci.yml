name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.4.0"
      - run: bun install
      - run: bun ci
      - run: bun run completions:audit
      - run: bun run completions:audit:docs
      - run: bun run check:full
